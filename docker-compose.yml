services:
  db:
    image: postgres:16-alpine
    container_name: scoring-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scoring
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  scoring-service:
    build: .
    container_name: scoring-service
    ports:
      - "8020:8000"
    env_file:
      - .env
    environment:
      SCORING_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/scoring
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: scoring-frontend
    ports:
      - "5173:80"
    depends_on:
      - scoring-service
    restart: unless-stopped

volumes:
  pgdata:
